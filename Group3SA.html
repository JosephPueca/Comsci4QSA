<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The most random online store ever</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#f5f5f5; }

.item img {
    width:100%;
    height:150px;
    object-fit:cover;
    border-radius:8px;
}

.card img {
    width:300px;
    height:300px;
    object-fit:cover;
    display:block;
    margin:auto;
}
</style>
</head>

<body>

<nav class="navbar navbar-dark bg-dark mb-4 shadow">
    <div class="container">
        <a class="navbar-brand" href="#">Random Store</a>
        <a class="btn btn-outline-light" href="about.html">About</a>
    </div>
</nav>

<div class="container py-4">
    <h1 class="text-center mb-4">The most random online store</h1>
    <div id="productContainer"></div>

    <div class="card mt-4">
        <div class="card-body">
            <h3>Cart</h3>
            <ul id="cartList" class="list-group mb-3"></ul>
            <h5>Total: ₱<span id="total">0</span></h5>

            <form action="http://52.74.133.173/cs3/checkout.php" method="POST" onsubmit="prepareCheckout();">
                <div class="row g-2">
                    <div class="col-md-4">
                        <input type="text" name="cust_name" class="form-control" placeholder="Name" required>
                    </div>
                    <div class="col-md-4">
                        <input type="text" name="cust_addr" class="form-control" placeholder="Address" required>
                    </div>
                    <div class="col-md-4">
                        <input type="email" name="cust_email" class="form-control" placeholder="Email" required>
                    </div>
                </div>

                <input type="hidden" name="cust_order" id="cust_order">
                <button class="btn btn-primary mt-3" type="submit">Checkout</button>
            </form>
        </div>
    </div>
</div>

<script>
var cart = [];

var categories = [
    {
        name: "Clothes",
        items: [
            ["Black Gothic Baggy Cargo Jeans", 2698.11],
            ["Buddha Stones Summer Plain Lace-up Button Front Design Lapel Sleeveless Cotton Midi Dress Cardigan", 2616.05],
            ["Old Navy", 845.75],
            ["Long sleeve polo", 1697.52],
            ["Fear of God Hoodie Hip Hop Couples Essential Tracksuits Sweatshirt", 1791.27]
        ]
    },
    {
        name: "Bags",
        items: [
            ["Birkin 25 Lizard Gris Tourterelle Gold hardware Stamp P (2012)", 1995000],
            ["Hermitage Red Cannage Lambskin", 295000],
            ["Pocket Juliet Bag 30 In Regenerative Cotton Denim With Quilting", 45623.50],
            ["Alexander McQueen Women's Manta OTT in Black", 329320.75],
            ["Balenciaga Bolero Bowling Bag Mini in rose quartz smooth calfskin and moka nappa lambskin lining, aged-gold hardware", 196993.69]
        ]
    },
    {
        name: "Perfumes",
        items: [
            ["Kay Ali Vanilla 28", 9142.79],
            ["Yves Saint Laurent Libre Eau De Parfum", 10809.09],
            ["Carolina Herrera Good Girl", 10800.00],
            ["Jean Paul Gaultier Divine", 11105.92],
            ["Tom Ford Black Orchid", 14405.51]
        ]
    },
    {
        name: "Games",
        items: [
            ["X6 psp handheld game console", 2837.00],
            ["Mattel Phase 10 Cards Game", 413.96],
            ["Invasion of The Cow Snatchers GM", 1784.00],
            ["Portable Reversi (Big) Vol.2", 387.81],
            ["Amerous 10 Ludo Go Board Folding Travel Magnetic Ludo", 1259.52]
        ]
    }
];

var container = document.getElementById("productContainer");

for (var i = 0; i < categories.length; i++) {
    var cat = categories[i];
    container.innerHTML += "<h4 class='mt-4'>" + cat.name + "</h4>";

    var row = "<div class='row g-3'>";

    for (var j = 0; j < cat.items.length; j++) {
        var p = cat.items[j];
        var imgUrl = "";

        if (p[0] == "Birkin 25 Lizard Gris Tourterelle Gold hardware Stamp P (2012)") {
            imgUrl = "https://github.com/JosephPueca/Comsci4QSA/blob/main/image1.jpg?raw=true";
        } else if (p[0] == "Hermitage Red Cannage Lambskin") {
            imgUrl = "https://github.com/JosephPueca/Comsci4QSA/blob/main/hermitage.jpg?raw=true";
        } else if (p[0] == "Pocket Juliet Bag 30 In Regenerative Cotton Denim With Quilting") {
            imgUrl = "https://github.com/JosephPueca/Comsci4QSA/blob/main/image7.jpg?raw=true";
        } else if (p[0] == "Alexander McQueen Women's Manta OTT in Black") {
            imgUrl = "https://github.com/JosephPueca/Comsci4QSA/blob/main/alexander.jpg?raw=true";
        } else if (p[0] == "Balenciaga Bolero Bowling Bag Mini in rose quartz smooth calfskin and moka nappa lambskin lining, aged-gold hardware") {
            imgUrl = "https://github.com/JosephPueca/Comsci4QSA/blob/main/image10.jpg?raw=true";
        } else if (p[0] == "Kay Ali Vanilla 28") {
            imgUrl = "https://github.com/JosephPueca/Comsci4QSA/blob/main/kayalivanila.png?raw=true";
        } else if (p[0] == "Yves Saint Laurent Libre Eau De Parfum") {
            imgUrl = "https://github.com/JosephPueca/Comsci4QSA/blob/main/yves.jpg?raw=true";
        } else if (p[0] == "Carolina Herrera Good Girl") {
            imgUrl = "https://raw.githubusercontent.com/JosephPueca/Comsci4QSA/f648ba87e9302accd482750e82eef4bf80a82bf3/image10.jpg";
        } else if (p[0] == "Jean Paul Gaultier Divine") {
            imgUrl = "https://github.com/JosephPueca/Comsci4QSA/blob/main/image3.png?raw=true";
        } else if (p[0] == "Tom Ford Black Orchid") {
            imgUrl = "https://github.com/JosephPueca/Comsci4QSA/blob/main/image9.jpg?raw=true";
        } else if (p[0] == "Black Gothic Baggy Cargo Jeans") {
            imgUrl = "https://github.com/JosephPueca/Comsci4QSA/blob/main/image5.jpg?raw=true";
        } else if (p[0] == "Buddha Stones Summer Plain Lace-up Button Front Design Lapel Sleeveless Cotton Midi Dress Cardigan") {
            imgUrl = "https://github.com/JosephPueca/Comsci4QSA/blob/main/image10.png?raw=true";
        } else if (p[0] == "Old Navy") {
            imgUrl = "https://github.com/JosephPueca/Comsci4QSA/blob/main/image8.png?raw=true";
        } else if (p[0] == "Long sleeve polo") {
            imgUrl = "https://github.com/JosephPueca/Comsci4QSA/blob/main/image9.png?raw=true";
        } else if (p[0] == "Fear of God Hoodie Hip Hop Couples Essential Tracksuits Sweatshirt") {
            imgUrl = "https://github.com/JosephPueca/Comsci4QSA/blob/main/image3.jpg?raw=true";
        } else if (p[0] == "Amerous 10 Ludo Go Board Folding Travel Magnetic Ludo") {
            imgUrl = "https://github.com/JosephPueca/Comsci4QSA/blob/main/ludo.jpg?raw=true";
        } else if (p[0] == "Portable Reversi (Big) Vol.2") {
            imgUrl = "https://github.com/JosephPueca/Comsci4QSA/blob/main/portable.jpg?raw=true";
        } else if (p[0] == "Invasion of The Cow Snatchers GM") {
            imgUrl = "https://github.com/JosephPueca/Comsci4QSA/blob/main/invasion.jpg?raw=true";
        } else if (p[0] == "Mattel Phase 10 Cards Game") {
            imgUrl = "https://github.com/JosephPueca/Comsci4QSA/blob/main/phase10.png?raw=true";
        } else if (p[0] == "X6 psp handheld game console") {
            imgUrl = "https://github.com/JosephPueca/Comsci4QSA/blob/main/x6.jpg?raw=true";
        }
        

        row += "<div class='col'>\
            <div class='card h-100 text-center p-2'>\
                <img src='" + imgUrl + "'>\
                <h6 class='mt-2'>" + p[0] + "</h6>\
                <p>₱" + p[1] + "</p>\
                <button class='btn btn-success' onclick=\"addToCart('" + p[0] + "'," + p[1] + ")\">Add</button>\
            </div>\
        </div>";
    }

    row += "</div>";
    container.innerHTML += row;
}

function addToCart(name, price) {
    cart.push({ prod_name: name, prod_price: price });
    displayCart();
}

function removeFromCart(index) {
    cart.splice(index, 1);
    displayCart();
}

function displayCart() {
    var list = document.getElementById("cartList");
    list.innerHTML = "";

    var total = 0;

    for (var i = 0; i < cart.length; i++) {
        var item = cart[i];
        total += item.prod_price;

        list.innerHTML += "<li class='list-group-item d-flex justify-content-between align-items-center'>" 
            + item.prod_name + " - ₱" + item.prod_price 
            + "<button class='btn btn-danger btn-sm' onclick='removeFromCart(" + i + ")'>X</button></li>";
    }

    document.getElementById("total").innerText = total;
}

function prepareCheckout() {
    document.getElementById("cust_order").value = JSON.stringify(cart);
}
</script>

</body>
</html>
